<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backpacking Weight Calculator</title>
<meta name="description" content="Calculate and track the weight of your backpacking gear. Plan your hiking trips with detailed weight breakdowns by category.">
<meta property="og:title" content="Backpacking Weight Calculator">
<meta property="og:description" content="Calculate and track the weight of your backpacking gear.">
<meta property="og:url" content="https://backpacking-calculator.netlify.app">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="keywords" content="backpacking, hiking, gear weight calculator, pack weight, ultralight, camping, travel gear">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://backpacking-calculator.netlify.app">
<link rel="sitemap" type="application/xml" href="/sitemap.xml">
</head>
<body>
<div class="app">
  <header>
    <h1>Gear Weight</h1>
    <div class="header-right">
      <div class="lang-dd glow-wrap gw-surface">
        <select class="lang-dd-btn" id="langSel" onchange="if(typeof SFX!='undefined')SFX.click();setLang(this.value)"></select>
      </div>
      <div class="sw glow-wrap gw-surface" id="unitSw"></div>
      <button class="snd-toggle" id="sndBtn" onclick="toggleSound()" title="Sound">&#128266;</button>
    </div>
  </header>
  <div class="actions-bar" id="actionsBar"></div>
  <div class="lists-bar" id="listsBar"></div>
  <div class="stats-bar" id="statsBar"></div>
  <div style="margin-bottom:24px">
    <button class="btn lg" id="addBtn" onclick="showAddM()"
      style="width:100%;justify-content:center;border-style:dashed;background:linear-gradient(135deg,rgba(78,205,196,0.05),rgba(167,139,250,0.05))">
    </button>
  </div>
  <div class="main-grid">
    <div class="panel"><div class="panel-title" id="pt"></div><div id="itemsList"></div></div>
    <div class="charts-area">
      <div class="chart-box"><div class="chart-title" id="ct1"></div><canvas id="ch1"></canvas></div>
      <div class="chart-box"><div class="chart-title" id="ct2"></div><canvas id="ch2"></canvas></div>
      <div class="chart-box"><div class="chart-title" id="ct3"></div><canvas id="ch3"></canvas></div>
    </div>
  </div>
</div>
<div class="mo" id="mDel"><div class="modal" id="mDelI"></div></div>
<div class="mo" id="mCat"><div class="modal" id="mCatI"></div></div>
<div class="mo" id="mSc"><div class="modal" id="mScI"></div></div>
<div class="mo" id="mList"><div class="modal" id="mListI"></div></div>
<div class="mo" id="mEdit"><div class="modal" id="mEditI"></div></div>
<div class="mo" id="mRen"><div class="modal" id="mRenI"></div></div>
<div class="mo" id="mAdd"><div class="modal" id="mAddI"></div></div>
<input type="file" id="impF" accept=".json">
<a href="https://buymeacoffee.com/tifaiden" target="_blank" rel="noopener"
   style="position:fixed;bottom:24px;right:24px;background:#FFDD00;color:#000;font-family:'NunitoSans','Nunito Sans',sans-serif;font-weight:700;font-size:.84rem;padding:10px 18px;border-radius:10px;text-decoration:none;box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:50;transition:transform .15s"
   onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
  ☕ Buy me a coffee
</a>
<script data-goatcounter="https://tifaiden.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<script src="app.js"></script>
</body>
</html>
